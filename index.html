<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>متجري | My Store</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  /* =============================================
     EASY EDIT ZONE — change colors & fonts here
  ============================================= */
  :root {
    --bg:        #f5f0eb;
    --card:      #ffffff;
    --accent:    #c8773a;
    --accent2:   #2d6a4f;
    --text:      #1a1a1a;
    --muted:     #7a7060;
    --border:    #e5ddd3;
    --radius:    14px;
    --font-ar:   'Tajawal', sans-serif;
    --font-en:   'DM Sans', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-ar);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    direction: rtl;
  }

  /* ---- LANGUAGE TOGGLE ---- */
  .lang-bar {
    background: var(--text);
    padding: 6px 24px;
    display: flex;
    justify-content: flex-start;
    gap: 6px;
  }
  .lang-btn {
    background: transparent;
    border: 1px solid rgba(255,255,255,.3);
    color: rgba(255,255,255,.7);
    padding: 3px 12px;
    border-radius: 20px;
    font-size: .78rem;
    cursor: pointer;
    transition: all .18s;
    font-family: var(--font-ar);
  }
  .lang-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* ---- HEADER ---- */
  header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 20px 40px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,.05);
  }
  .logo { font-family: var(--font-ar); font-size: 1.7rem; font-weight: 800; color: var(--accent); }
  .logo span { color: var(--text); }
  .tagline { font-size: .82rem; color: var(--muted); letter-spacing: .03em; text-align: left; direction: ltr; }

  /* ---- HERO ---- */
  .hero { text-align: center; padding: 64px 20px 48px; }
  .hero h1 { font-family: var(--font-ar); font-size: clamp(1.8rem,5vw,3rem); line-height: 1.3; font-weight: 800; margin-bottom: 14px; }
  .hero p { color: var(--muted); font-size: 1.05rem; max-width: 500px; margin: 0 auto; line-height: 1.8; }
  .divider { width: 60px; height: 3px; background: var(--accent); margin: 20px auto 0; border-radius: 2px; }

  /* ---- PRODUCTS GRID ---- */
  .products-section { padding: 0 24px 64px; }
  .section-title { font-family: var(--font-ar); font-size: 1.5rem; font-weight: 700; margin-bottom: 28px; text-align: center; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 24px; max-width: 1100px; margin: 0 auto;
  }
  .card {
    background: var(--card); border-radius: var(--radius); border: 1px solid var(--border);
    overflow: hidden; transition: transform .22s ease, box-shadow .22s ease;
    display: flex; flex-direction: column; cursor: pointer;
  }
  .card:hover { transform: translateY(-4px); box-shadow: 0 16px 40px rgba(0,0,0,.1); }
  .card-img-wrap {
    width: 100%; aspect-ratio: 4/3; overflow: hidden; background: #f0ebe3;
    display: flex; align-items: center; justify-content: center; position: relative;
  }
  .card-img-wrap img { width: 100%; height: 100%; object-fit: cover; transition: transform .35s ease; }
  .card:hover .card-img-wrap img { transform: scale(1.05); }
  .view-hint {
    position: absolute; bottom: 8px; left: 8px;
    background: rgba(0,0,0,.45); color: #fff;
    font-size: .72rem; padding: 4px 10px; border-radius: 20px;
    opacity: 0; transition: opacity .2s; pointer-events: none;
    font-family: var(--font-ar);
  }
  .card:hover .view-hint { opacity: 1; }
  .card-body { padding: 18px; flex: 1; display: flex; flex-direction: column; }
  .card-name { font-family: var(--font-ar); font-size: 1.1rem; font-weight: 700; margin-bottom: 4px; }
  .card-name-en { font-family: var(--font-en); font-size: .78rem; color: var(--muted); margin-bottom: 8px; }
  .card-desc { font-size: .88rem; color: var(--muted); line-height: 1.7; flex: 1; margin-bottom: 14px; }
  .card-footer { display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-direction: row-reverse; }

  /* Note: flex-direction row-reverse because RTL — price on right, button on left visually */
  .price { font-size: 1.2rem; font-weight: 700; color: var(--accent); font-family: var(--font-ar); }
  .price small { font-size: .72rem; color: var(--muted); font-weight: 400; margin-right: 2px; }

  .btn-wa {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--accent2); color: #fff; border: none; border-radius: 8px;
    padding: 9px 14px; font-size: .85rem; font-family: var(--font-ar); font-weight: 500;
    cursor: pointer; transition: background .18s, transform .15s; white-space: nowrap;
    direction: rtl;
  }
  .btn-wa:hover { background: #1e5c3f; transform: scale(1.03); }
  .btn-wa svg { width: 16px; height: 16px; fill: #fff; flex-shrink: 0; }

  /* ================================================
     PRODUCT DETAIL MODAL
  ================================================ */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(15,12,8,.6); backdrop-filter: blur(5px);
    display: flex; align-items: center; justify-content: center; padding: 20px;
    opacity: 0; pointer-events: none; transition: opacity .28s ease;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--card); border-radius: 20px;
    width: 100%; max-width: 820px; max-height: 92vh; overflow-y: auto;
    display: grid; grid-template-columns: 1fr 1fr;
    box-shadow: 0 32px 80px rgba(0,0,0,.28);
    transform: translateY(32px) scale(.97);
    transition: transform .32s cubic-bezier(.22,1,.36,1);
    position: relative; direction: rtl;
  }
  .modal-overlay.open .modal { transform: translateY(0) scale(1); }

  .modal-x {
    position: absolute; top: 14px; left: 14px; z-index: 5;
    width: 34px; height: 34px; border-radius: 50%;
    background: var(--bg); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem; color: var(--muted); cursor: pointer;
    transition: background .15s, color .15s;
  }
  .modal-x:hover { background: var(--text); color: #fff; }

  /* Image is on the LEFT side (LTR: right; RTL: left → we place it second in DOM) */
  .modal-img { border-radius: 0 20px 20px 0; overflow: hidden; background: #f0ebe3; }
  .modal-img img { width: 100%; height: 100%; object-fit: cover; display: block; }

  .modal-body { padding: 34px 30px; display: flex; flex-direction: column; }

  .modal-badge {
    display: inline-block; align-self: flex-start;
    background: #fff4ec; color: var(--accent);
    font-size: .75rem; font-weight: 700; letter-spacing: .03em;
    padding: 4px 12px; border-radius: 20px; margin-bottom: 12px;
    font-family: var(--font-ar);
  }
  .modal-title { font-family: var(--font-ar); font-size: 1.6rem; font-weight: 800; line-height: 1.3; margin-bottom: 4px; }
  .modal-title-en { font-family: var(--font-en); font-size: .9rem; color: var(--muted); margin-bottom: 12px; }
  .modal-price { font-size: 1.5rem; font-weight: 800; color: var(--accent); margin-bottom: 16px; font-family: var(--font-ar); }
  .modal-price small { font-size: .85rem; color: var(--muted); font-weight: 400; }
  .modal-sep { height: 1px; background: var(--border); margin-bottom: 16px; }
  .modal-longdesc { font-size: .95rem; line-height: 1.85; color: #444; margin-bottom: 20px; flex: 1; }

  .modal-specs { list-style: none; margin-bottom: 24px; }
  .modal-specs li {
    display: flex; gap: 10px; font-size: .88rem;
    padding: 7px 0; border-bottom: 1px solid var(--border);
  }
  .modal-specs li:last-child { border-bottom: none; }
  .modal-specs li strong { color: var(--text); min-width: 90px; flex-shrink: 0; font-family: var(--font-ar); }
  .modal-specs li span { color: var(--muted); }

  .modal-actions { display: flex; flex-direction: column; gap: 10px; }

  .btn-wa-lg {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    background: var(--accent2); color: #fff; border: none; border-radius: 10px;
    padding: 14px 20px; font-size: .98rem; font-family: var(--font-ar); font-weight: 700;
    cursor: pointer; transition: background .18s, transform .15s; direction: rtl;
  }
  .btn-wa-lg:hover { background: #1e5c3f; transform: scale(1.02); }
  .btn-wa-lg svg { width: 20px; height: 20px; fill: #fff; flex-shrink: 0; }

  .btn-back {
    display: flex; align-items: center; justify-content: center;
    background: transparent; color: var(--muted); border: 1.5px solid var(--border);
    border-radius: 10px; padding: 11px 20px;
    font-size: .9rem; font-family: var(--font-ar); font-weight: 500;
    cursor: pointer; transition: border-color .18s, color .18s;
  }
  .btn-back:hover { border-color: var(--text); color: var(--text); }

  /* Mobile modal */
  @media (max-width: 640px) {
    .modal { grid-template-columns: 1fr; }
    .modal-img { border-radius: 20px 20px 0 0; aspect-ratio: 16/9; }
    .modal-img img { height: 100%; }
    .modal-body { padding: 22px 18px; }
    .modal-title { font-size: 1.25rem; }
  }

  /* ---- ORDER FORM ---- */
  .form-section { background: var(--card); border-top: 1px solid var(--border); padding: 60px 24px; }
  .form-wrap { max-width: 540px; margin: 0 auto; }
  .form-wrap h2 { font-family: var(--font-ar); font-size: 1.8rem; font-weight: 800; margin-bottom: 8px; }
  .form-wrap p { color: var(--muted); font-size: .95rem; margin-bottom: 28px; line-height: 1.8; }
  .form-group { margin-bottom: 18px; }
  label {
    display: block; font-size: .85rem; font-weight: 600;
    color: var(--muted); margin-bottom: 6px; font-family: var(--font-ar);
  }
  label span.lbl-en { font-family: var(--font-en); font-size: .75rem; font-weight: 400; margin-right: 6px; color: #bbb; }
  input, textarea {
    width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 9px;
    font-family: var(--font-ar); font-size: .95rem; background: var(--bg); color: var(--text);
    transition: border-color .18s; outline: none; resize: vertical; direction: rtl;
  }
  input:focus, textarea:focus { border-color: var(--accent); }
  .btn-submit {
    width: 100%; padding: 14px; background: var(--accent); color: #fff; border: none; border-radius: 9px;
    font-family: var(--font-ar); font-size: 1rem; font-weight: 700; cursor: pointer;
    transition: background .18s, transform .15s; display: flex; align-items: center; justify-content: center; gap: 8px; direction: rtl;
  }
  .btn-submit:hover { background: #a85e28; transform: scale(1.01); }
  .btn-submit svg { width: 20px; height: 20px; fill: #fff; }

  /* ---- FOOTER ---- */
  footer { text-align: center; padding: 28px; font-size: .85rem; color: var(--muted); border-top: 1px solid var(--border); }

  /* ---- TOAST ---- */
  .toast {
    position: fixed; bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #1a1a1a; color: #fff; padding: 12px 22px; border-radius: 30px;
    font-size: .9rem; opacity: 0; transition: all .35s ease; pointer-events: none; z-index: 999;
    font-family: var(--font-ar);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* English mode — switch to LTR, swap fonts */
  body.en { direction: ltr; font-family: var(--font-en); }
  body.en header { direction: ltr; }
  body.en .tagline { direction: ltr; text-align: right; }
  body.en .hero h1, body.en .section-title, body.en .form-wrap h2 { font-family: var(--font-en); }
  body.en .card-name { font-family: var(--font-en); font-weight: 600; }
  body.en .card-footer { flex-direction: row; }
  body.en input, body.en textarea { direction: ltr; font-family: var(--font-en); }
  body.en label { font-family: var(--font-en); }
  body.en .btn-wa, body.en .btn-wa-lg, body.en .btn-submit, body.en .btn-back,
  body.en .modal-body, body.en .modal-specs li strong { font-family: var(--font-en); }
  body.en .modal { direction: ltr; }
  body.en .modal-img { border-radius: 20px 0 0 20px; }
  body.en .modal-x { left: auto; right: 14px; }
  body.en .view-hint { left: auto; right: 8px; }
  body.en .toast { font-family: var(--font-en); }

  @media (max-width: 500px) {
    header { padding: 16px 20px; }
    .hero { padding: 40px 16px 32px; }
  }
</style>
</head>

function setLang(lang) {
  LANG = lang;
  document.getElementById("btn-ar").classList.toggle("active", lang === "ar");
  document.getElementById("btn-en").classList.toggle("active", lang === "en");
  document.body.classList.toggle("en", lang === "en");
  document.documentElement.lang = lang;
  document.documentElement.dir  = lang === "ar" ? "rtl" : "ltr";

  const t = UI[lang];
  document.getElementById("logo-text").textContent      = t.logo;
  document.getElementById("tagline").textContent        = t.tagline;
  document.getElementById("hero-title").innerHTML       = t.heroTitle;
  document.getElementById("hero-sub").textContent       = t.heroSub;
  document.getElementById("products-title").textContent = t.productsTitle;
  document.getElementById("form-title").textContent     = t.formTitle;
  document.getElementById("form-btn-text").textContent  = t.formBtn;
  document.getElementById("form-sub").textContent       = t.formSub;
  document.getElementById("footer-text").innerHTML      = t.footer;
  document.getElementById("modal-wa-text").textContent  = t.waModalBtn;
  document.getElementById("modal-back-btn").textContent = t.backBtn;
  document.getElementById("fname").placeholder   = t.fnPlaceholder;
  document.getElementById("fphone").placeholder  = t.fphPlaceholder;
  document.getElementById("faddress").placeholder = t.faPlaceholder;
  document.getElementById("fnote").placeholder   = t.fnPlaceholder2;

  renderProducts();
}

/* ---- Render cards ---- */
function renderProducts() {
  const t = UI[LANG];
  document.getElementById("products-grid").innerHTML = PRODUCTS.map((p, i) => `
    <div class="card" onclick="openModal(${i})">
      <div class="card-img-wrap">
        <img src="${p.image}" alt="${LANG === 'ar' ? p.name_ar : p.name_en}" loading="lazy" />
        <span class="view-hint">${t.viewHint}</span>
      </div>
      <div class="card-body">
        <div class="card-name">${LANG === 'ar' ? p.name_ar : p.name_en}</div>
        <div class="card-name-en">${LANG === 'ar' ? p.name_en : ''}</div>
        <div class="card-desc">${LANG === 'ar' ? p.desc_ar : p.desc_en}</div>
        <div class="card-footer">
          <div class="price">${p.price.toLocaleString()} <small>${LANG === 'ar' ? CONFIG.currency : CONFIG.currency_en}</small></div>
          <button class="btn-wa" onclick="event.stopPropagation(); orderProduct(${i})">
            ${WA_SVG} ${t.orderBtn}
          </button>
        </div>
      </div>
    </div>
  `).join("");
}

/* ---- Modal ---- */
function openModal(i) {
  const p = PRODUCTS[i];
  const t = UI[LANG];
  document.getElementById("modal-img").src = p.image;
  document.getElementById("modal-badge").textContent   = LANG === 'ar' ? p.badge_ar : p.badge_en;
  document.getElementById("modal-title").textContent   = LANG === 'ar' ? p.name_ar  : p.name_en;
  document.getElementById("modal-title-en").textContent = LANG === 'ar' ? p.name_en : '';
  document.getElementById("modal-price").innerHTML =
    `${p.price.toLocaleString()} <small>${LANG === 'ar' ? CONFIG.currency : CONFIG.currency_en}</small>`;
  document.getElementById("modal-longdesc").textContent = LANG === 'ar' ? p.longDesc_ar : p.longDesc_en;
  document.getElementById("modal-specs").innerHTML = (p.details || []).map(d =>
    `<li><strong>${LANG === 'ar' ? d.label_ar : d.label_en}</strong><span>${d.value}</span></li>`
  ).join("");
  document.getElementById("modal-wa-btn").onclick = () => { closeModal(); orderProduct(i); };
  document.getElementById("modal-overlay").classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeModal() {
  document.getElementById("modal-overlay").classList.remove("open");
  document.body.style.overflow = "";
}
function handleOverlayClick(e) {
  if (e.target === document.getElementById("modal-overlay")) closeModal();
}
document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

/* ---- Order ---- */
function orderProduct(i) {
  openWhatsApp(UI[LANG].waMsg(PRODUCTS[i]));
}

function sendFormOrder() {
  const name    = document.getElementById("fname").value.trim();
  const phone   = document.getElementById("fphone").value.trim();
  const address = document.getElementById("faddress").value.trim();
  const note    = document.getElementById("fnote").value.trim();
  if (!name || !phone || !address) { showToast(UI[LANG].toastErr); return; }
  openWhatsApp(UI[LANG].waFormMsg(name, phone, address, note));
}

function openWhatsApp(msg) {
  window.open(`https://wa.me/${CONFIG.whatsappNumber}?text=${encodeURIComponent(msg)}`, "_blank");
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 3200);
}

/* Init */
renderProducts();
